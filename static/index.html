<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<title>Footy Predict</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/static/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/static/icon.svg">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0b1220; --panel: #121a2b; --panel-hi: #1a2340;
    --text: #eaf0fb; --muted: #8695b8; --accent: #3ea3ff;
    --green: #35d07f; --red: #ff5a6a; --yellow: #ffb84a;
    --border: #233056;
  }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }

  header {
    background: linear-gradient(135deg, #0b1220 0%, #162044 100%);
    padding: max(env(safe-area-inset-top), 16px) 16px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  h1 span { color: var(--accent); }
  .league-select {
    margin-top: 10px; width: 100%;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 15px;
  }
  main { padding: 12px; max-width: 720px; margin: 0 auto; }

  .tabs { display: flex; gap: 4px; margin-bottom: 12px; background: var(--panel); border-radius: 10px; padding: 4px; }
  .tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; color: var(--muted); border-radius: 8px; cursor: pointer; transition: 0.2s; }
  .tab.active { background: var(--panel-hi); color: var(--text); font-weight: 600; }

  .fixture {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; margin-bottom: 12px;
  }
  .fixture-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .teams { font-size: 15px; font-weight: 600; }
  .teams .vs { color: var(--muted); font-weight: 400; margin: 0 6px; }
  .kickoff { font-size: 12px; color: var(--muted); }

  .probs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin: 10px 0 8px; }
  .prob { background: var(--panel-hi); padding: 8px 6px; border-radius: 8px; text-align: center; }
  .prob .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .prob .val { font-size: 17px; font-weight: 700; margin-top: 2px; }
  .prob.favored .val { color: var(--accent); }

  .meta { display: flex; gap: 10px; font-size: 12px; color: var(--muted); margin-top: 6px; flex-wrap: wrap; }
  .meta span { background: var(--panel-hi); padding: 3px 8px; border-radius: 6px; }

  .value-row { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
  .value-row .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .value-bet { display: inline-block; background: rgba(53, 208, 127, 0.12); color: var(--green); border: 1px solid rgba(53, 208, 127, 0.4); padding: 5px 9px; border-radius: 6px; font-size: 12px; font-weight: 600; margin-right: 6px; margin-top: 4px; }
  .value-bet.none { background: transparent; border: 1px dashed var(--border); color: var(--muted); font-weight: 400; }

  .expanded { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; }
  .expanded.show { display: block; }
  .expand-btn { background: transparent; border: none; color: var(--accent); font-size: 13px; margin-top: 8px; cursor: pointer; padding: 4px 0; }

  .scorelines { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 8px; }
  .scoreline { background: var(--panel-hi); padding: 8px 4px; border-radius: 6px; text-align: center; }
  .scoreline .score { font-size: 14px; font-weight: 600; }
  .scoreline .pct { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .markets { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .market { background: var(--panel-hi); padding: 8px; border-radius: 8px; }
  .market .lbl { font-size: 11px; color: var(--muted); }
  .market .row { display: flex; justify-content: space-between; margin-top: 4px; font-size: 13px; }

  .empty { padding: 40px 20px; text-align: center; color: var(--muted); }
  .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .manual { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
  .manual select, .manual input { width: 100%; background: var(--panel-hi); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 8px; }
  .manual button { width: 100%; background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }

  .error { background: rgba(255, 90, 106, 0.1); border: 1px solid rgba(255, 90, 106, 0.4); color: var(--red); padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }

  .chip { flex: 1; background: var(--panel-hi); color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 8px 6px; font-size: 12px; cursor: pointer; transition: 0.15s; }
  .chip.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
</style>
</head>
<body>
<header>
  <h1>Footy <span>Predict</span></h1>
  <select id="league" class="league-select"></select>
</header>

<main>
  <div class="tabs">
    <div class="tab active" data-tab="fixtures">Upcoming</div>
    <div class="tab" data-tab="accas">Accas</div>
    <div class="tab" data-tab="manual">Custom</div>
  </div>

  <div id="tab-fixtures">
    <div id="fixtures-list"><div class="spinner"></div></div>
  </div>

  <div id="tab-accas" style="display:none;">
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:12px;">
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Time window</div>
      <div style="display:flex;gap:6px;margin-bottom:12px;">
        <button class="chip" data-days="1" onclick="setAccaDays(1)">Today</button>
        <button class="chip active" data-days="3" onclick="setAccaDays(3)">3 days</button>
        <button class="chip" data-days="7" onclick="setAccaDays(7)">7 days</button>
      </div>
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Legs per acca</div>
      <div style="display:flex;gap:6px;margin-bottom:12px;">
        <button class="chip legs-chip" data-legs="auto" onclick="setAccaLegs('auto')">Auto</button>
        <button class="chip legs-chip active" data-legs="3" onclick="setAccaLegs(3)">3</button>
        <button class="chip legs-chip" data-legs="4" onclick="setAccaLegs(4)">4</button>
        <button class="chip legs-chip" data-legs="5" onclick="setAccaLegs(5)">5</button>
        <button class="chip legs-chip" data-legs="6" onclick="setAccaLegs(6)">6</button>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer;">
        <input type="checkbox" id="acca-all-leagues" onchange="loadAccas()" style="width:16px;height:16px;accent-color:var(--accent);">
        Build from all leagues (not just selected)
      </label>
    </div>
    <div id="accas-content"><div class="spinner"></div></div>
  </div>

  <div id="tab-manual" style="display:none;">
    <div class="manual">
      <label style="font-size:12px;color:var(--muted);">Home team</label>
      <select id="m-home"></select>
      <label style="font-size:12px;color:var(--muted);">Away team</label>
      <select id="m-away"></select>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px;">
        <input id="m-oh" placeholder="Odds H" type="number" step="0.01">
        <input id="m-od" placeholder="Odds D" type="number" step="0.01">
        <input id="m-oa" placeholder="Odds A" type="number" step="0.01">
      </div>
      <button onclick="manualPredict()">Predict</button>
    </div>
    <div id="manual-result" style="margin-top:12px;"></div>
  </div>
</main>

<script>
const $ = s => document.querySelector(s);
const API = '';  // same origin
let currentLeague = null;

async function init() {
  // Register service worker for PWA / offline shell
  if ('serviceWorker' in navigator) {
    try { await navigator.serviceWorker.register('/sw.js'); } catch(e) {}
  }

  // Load leagues
  const r = await fetch(API + '/api/leagues').then(r => r.json());
  const sel = $('#league');
  if (!r.leagues.length) {
    sel.innerHTML = '<option>No trained models — run train.py</option>';
    $('#fixtures-list').innerHTML = '<div class="empty">No models found.<br>Run <code>python train.py</code> first.</div>';
    return;
  }
  sel.innerHTML = r.leagues.map(l => `<option value="${l.code}">${l.name}</option>`).join('');
  sel.addEventListener('change', () => { currentLeague = sel.value; loadFixtures(); loadTeams(); });
  currentLeague = sel.value;

  if (!r.odds_configured) {
    $('#fixtures-list').innerHTML = '<div class="error">ODDS_API_KEY not set on server. Upcoming fixtures unavailable. Use "Custom match" tab to predict manually.</div>';
  } else {
    loadFixtures();
  }
  loadTeams();

  // Tab switching
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    const tab = t.dataset.tab;
    $('#tab-fixtures').style.display = tab === 'fixtures' ? '' : 'none';
    $('#tab-accas').style.display = tab === 'accas' ? '' : 'none';
    $('#tab-manual').style.display = tab === 'manual' ? '' : 'none';
    if (tab === 'accas') loadAccas();
  }));
}

let accaDays = 3;
let accaLegs = 3;  // 'auto' or a number

function setAccaDays(d) {
  accaDays = d;
  document.querySelectorAll('.chip').forEach(c => {
    if (c.dataset.days !== undefined)
      c.classList.toggle('active', +c.dataset.days === d);
  });
  loadAccas();
}

function setAccaLegs(n) {
  accaLegs = n;
  document.querySelectorAll('.legs-chip').forEach(c => {
    const val = c.dataset.legs;
    c.classList.toggle('active', val === String(n));
  });
  loadAccas();
}

function targetLegsQS() {
  return accaLegs === 'auto' ? '' : `&target_legs=${accaLegs}`;
}

async function loadAccas() {
  $('#accas-content').innerHTML = '<div class="spinner"></div>';
  const allLeagues = $('#acca-all-leagues').checked;
  try {
    if (allLeagues) {
      await loadAccasAllLeagues();
    } else {
      const r = await fetch(`${API}/api/accas/${currentLeague}?days=${accaDays}${targetLegsQS()}`);
      if (!r.ok) throw new Error((await r.json()).detail || await r.text());
      const data = await r.json();
      renderAccas(data);
    }
  } catch(e) {
    $('#accas-content').innerHTML = `<div class="error">Could not load accas: ${e.message}</div>`;
  }
}

async function loadAccasAllLeagues() {
  // Fetch per-league accas in parallel, merge all candidate legs, rebuild globally.
  const leaguesResp = await fetch(`${API}/api/leagues`).then(r => r.json());
  const fetches = leaguesResp.leagues.map(l =>
    fetch(`${API}/api/accas/${l.code}?days=${accaDays}${targetLegsQS()}`).then(r => r.json()).catch(() => null)
  );
  const results = await Promise.all(fetches);

  const allLegs = [];
  let totalFixtures = 0;
  for (const r of results) {
    if (!r || !r.accas) continue;
    totalFixtures += r.fixtures_considered || 0;
    for (const kind of ['safe', 'value', 'max_odds_safe']) {
      for (const l of r.accas[kind].legs) allLegs.push({ ...l, league: r.league_name });
    }
  }
  const seen = new Set();
  const deduped = allLegs.filter(l => {
    const k = `${l.fixture_id}|${l.market_key}`;
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });

  // Determine cap — if target_legs is set, use it, else default 5 / 4 / 5 by kind.
  const targetCap = accaLegs === 'auto' ? null : accaLegs;

  const byFixtureSafe = {};
  const byFixtureVal = {};
  const safePool = {};
  for (const m of deduped) {
    if (m.model_prob >= 65) {
      const c = byFixtureSafe[m.fixture_id];
      if (!c || m.model_prob > c.model_prob) byFixtureSafe[m.fixture_id] = m;
    }
    if (m.edge_pct >= 3) {
      const c = byFixtureVal[m.fixture_id];
      if (!c || m.edge_pct > c.edge_pct) byFixtureVal[m.fixture_id] = m;
    }
    if (m.model_prob >= 60) {
      const c = safePool[m.fixture_id];
      if (!c || m.odds > c.odds) safePool[m.fixture_id] = m;
    }
  }
  const safeCap = targetCap || 4;
  const valueCap = targetCap || 5;
  const maxCap = targetCap || 5;

  const safe = Object.values(byFixtureSafe).sort((a,b) => b.model_prob - a.model_prob).slice(0, safeCap);
  const value = Object.values(byFixtureVal).sort((a,b) => b.edge_pct - a.edge_pct).slice(0, valueCap);
  const poolSorted = Object.values(safePool).sort((a,b) => b.odds - a.odds);
  const maxOddsLegs = [];
  let runningProb = 1.0;
  const floor = targetCap ? 0.25 : 0.30;
  for (const m of poolSorted) {
    const next = runningProb * (m.model_prob / 100);
    if (next < floor && !targetCap && maxOddsLegs.length >= 3) break;
    maxOddsLegs.push(m);
    runningProb = next;
    if (maxOddsLegs.length >= maxCap) break;
  }

  const pack = legs => {
    if (!legs.length) return { legs: [], combined_odds: 0, combined_prob_pct: 0, edge_pct: 0, return_on_10: 0 };
    let odds = 1, prob = 1;
    for (const l of legs) { odds *= l.odds; prob *= l.model_prob / 100; }
    return {
      legs, combined_odds: odds, combined_prob_pct: prob * 100,
      edge_pct: (prob * odds - 1) * 100, return_on_10: 10 * odds
    };
  };

  renderAccas({
    fixtures_considered: totalFixtures,
    league_name: 'all leagues',
    days: accaDays,
    target_legs: targetCap,
    accas: { safe: pack(safe), value: pack(value), max_odds_safe: pack(maxOddsLegs) }
  });
}

function renderAccas(data) {
  if (!data.accas) {
    $('#accas-content').innerHTML = `<div class="empty">${data.message || 'No upcoming fixtures to build accas from.'}</div>`;
    return;
  }
  const { safe, value, max_odds_safe } = data.accas;
  const windowLabel = data.days === 1 ? 'today' : `next ${data.days} days`;
  $('#accas-content').innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Based on ${data.fixtures_considered} fixtures in ${data.league_name} over the ${windowLabel}.</div>
    ${renderAcca('Safe', 'Highest-probability picks, low bust risk', safe, 'var(--accent)')}
    ${renderAcca('Value', 'Positive edge vs bookies, longer shot', value, 'var(--green)')}
    ${renderAcca('Max odds (safe)', 'Biggest payout while combined prob ≥ 30%', max_odds_safe, 'var(--yellow)')}
    <div style="font-size:11px;color:var(--muted);line-height:1.5;margin-top:8px;">Accas compound bookmaker margin: a 4-fold of 70%-prob picks lands ~24% of the time. Singles have smaller edges but are more reliable. O/U and BTTS legs use fair odds estimated from the model (bookie odds not available for those markets via the free odds feed).</div>
  `;
}

function renderAcca(title, subtitle, acca, color) {
  if (!acca.legs.length) {
    return `<div class="fixture" style="opacity:0.6;">
      <div class="fixture-top"><div class="teams">${title}</div></div>
      <div style="color:var(--muted);font-size:13px;">No qualifying picks in this window.</div>
    </div>`;
  }
  const legsHtml = acca.legs.map(l => `
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);font-size:13px;">
      <div>
        <div style="font-weight:500;">${l.description}</div>
        <div style="font-size:11px;color:var(--muted);">${l.match}${l.league ? ' · ' + l.league : ''} · ${fmtTime(l.commence_time)}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-weight:500;">@ ${l.odds.toFixed(2)}</div>
        <div style="font-size:11px;color:var(--muted);">prob ${l.model_prob}%</div>
      </div>
    </div>
  `).join('');
  const edgeCol = acca.edge_pct >= 0 ? 'var(--green)' : 'var(--red)';
  return `<div class="fixture">
    <div class="fixture-top">
      <div>
        <div style="font-size:15px;font-weight:600;color:${color};">${title}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;">${subtitle}</div>
      </div>
      <div style="background:var(--panel-hi);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;">${acca.legs.length}-fold</div>
    </div>
    <div style="margin-top:8px;">${legsHtml}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;">
      <div><div style="color:var(--muted);">Combined odds</div><div style="font-size:15px;font-weight:600;margin-top:2px;">${acca.combined_odds.toFixed(2)}</div></div>
      <div><div style="color:var(--muted);">Combined prob</div><div style="font-size:15px;font-weight:600;margin-top:2px;">${acca.combined_prob_pct.toFixed(1)}%</div></div>
      <div><div style="color:var(--muted);">Edge (EV)</div><div style="font-size:15px;font-weight:600;margin-top:2px;color:${edgeCol};">${acca.edge_pct >= 0 ? '+' : ''}${acca.edge_pct.toFixed(1)}%</div></div>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-top:8px;">£10 → £${acca.return_on_10.toFixed(2)} if all legs land</div>
  </div>`;
}

async function loadFixtures() {
  $('#fixtures-list').innerHTML = '<div class="spinner"></div>';
  try {
    const r = await fetch(`${API}/api/fixtures?league=${currentLeague}`);
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    render(data.fixtures);
  } catch(e) {
    $('#fixtures-list').innerHTML = `<div class="error">Could not load fixtures: ${e.message}</div>`;
  }
}

async function loadTeams() {
  try {
    const r = await fetch(`${API}/api/teams/${currentLeague}`).then(r => r.json());
    const opts = r.teams.map(t => `<option>${t}</option>`).join('');
    $('#m-home').innerHTML = opts;
    $('#m-away').innerHTML = opts;
    if (r.teams.length > 1) $('#m-away').selectedIndex = 1;
  } catch(e) {}
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString([], { weekday: 'short', hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' });
}

function render(fixtures) {
  if (!fixtures.length) { $('#fixtures-list').innerHTML = '<div class="empty">No upcoming fixtures.</div>'; return; }
  $('#fixtures-list').innerHTML = fixtures.map((f, i) => renderFixture(f, i)).join('');
}

function renderFixture(f, i) {
  if (f.error) {
    return `<div class="fixture">
      <div class="fixture-top"><div class="teams">${f.home_raw} <span class="vs">vs</span> ${f.away_raw}</div>
      <div class="kickoff">${fmtTime(f.commence_time)}</div></div>
      <div style="color:var(--muted);font-size:12px;">⚠️ ${f.error} — team name mismatch</div>
    </div>`;
  }
  const p = f.prediction;
  const wp = p.win_probs;
  const winner = wp.home >= wp.draw && wp.home >= wp.away ? 'home'
               : wp.away >= wp.draw ? 'away' : 'draw';
  const vbets = f.value_bets || {};
  const valueBadges = ['home','draw','away'].map(k => {
    if (!vbets[k]) return '';
    if (vbets[k].is_value) return `<span class="value-bet">★ ${k.toUpperCase()} +${vbets[k].edge_pct}%</span>`;
    return '';
  }).join('');

  return `<div class="fixture">
    <div class="fixture-top">
      <div class="teams">${f.home} <span class="vs">vs</span> ${f.away}</div>
      <div class="kickoff">${fmtTime(f.commence_time)}</div>
    </div>
    <div class="probs">
      <div class="prob ${winner==='home'?'favored':''}"><div class="lbl">Home</div><div class="val">${wp.home}%</div></div>
      <div class="prob ${winner==='draw'?'favored':''}"><div class="lbl">Draw</div><div class="val">${wp.draw}%</div></div>
      <div class="prob ${winner==='away'?'favored':''}"><div class="lbl">Away</div><div class="val">${wp.away}%</div></div>
    </div>
    <div class="meta">
      <span>xG ${p.expected_goals.home}–${p.expected_goals.away}</span>
      <span>O2.5 ${p.goals.over_2_5}%</span>
      <span>BTTS ${p.btts.yes}%</span>
    </div>
    ${valueBadges ? `<div class="value-row"><div class="lbl">Value vs bookies</div>${valueBadges}</div>` : ''}
    <button class="expand-btn" onclick="toggle(${i})">Show details ▾</button>
    <div class="expanded" id="exp-${i}">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Most likely scorelines</div>
      <div class="scorelines">
        ${p.top_scorelines.map(s => `<div class="scoreline"><div class="score">${s.score}</div><div class="pct">${s.pct}%</div></div>`).join('')}
      </div>
      <div class="markets">
        <div class="market"><div class="lbl">Goals</div>
          <div class="row"><span>Over 2.5</span><span>${p.goals.over_2_5}%</span></div>
          <div class="row"><span>Under 2.5</span><span>${p.goals.under_2_5}%</span></div>
        </div>
        <div class="market"><div class="lbl">BTTS</div>
          <div class="row"><span>Yes</span><span>${p.btts.yes}%</span></div>
          <div class="row"><span>No</span><span>${p.btts.no}%</span></div>
        </div>
      </div>
      ${renderValueTable(vbets, f.odds)}
    </div>
  </div>`;
}

function renderValueTable(vb, odds) {
  if (!vb || !Object.keys(vb).length) return '';
  return `<div style="margin-top:10px;font-size:12px;">
    <div style="color:var(--muted);margin-bottom:4px;">Bookie odds vs model</div>
    ${['home','draw','away'].filter(k => vb[k]).map(k => `
      <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);">
        <span>${k.toUpperCase()} @ ${vb[k].odds}</span>
        <span>Model ${vb[k].model_prob}% · Edge <b style="color:${vb[k].is_value?'var(--green)':'var(--muted)'}">${vb[k].edge_pct>0?'+':''}${vb[k].edge_pct}%</b></span>
      </div>`).join('')}
  </div>`;
}

function toggle(i) {
  const el = document.getElementById('exp-' + i);
  el.classList.toggle('show');
  event.target.textContent = el.classList.contains('show') ? 'Hide details ▴' : 'Show details ▾';
}

async function manualPredict() {
  const home = $('#m-home').value, away = $('#m-away').value;
  if (home === away) { $('#manual-result').innerHTML = '<div class="error">Pick two different teams.</div>'; return; }
  const oh = $('#m-oh').value, od = $('#m-od').value, oa = $('#m-oa').value;
  const qs = (oh && od && oa) ? `?odds_h=${oh}&odds_d=${od}&odds_a=${oa}` : '';
  try {
    const r = await fetch(`${API}/api/predict/${currentLeague}/${encodeURIComponent(home)}/${encodeURIComponent(away)}${qs}`);
    if (!r.ok) throw new Error((await r.json()).detail);
    const p = await r.json();
    const vbets = p.value_bets || {};
    $('#manual-result').innerHTML = renderFixture({
      home, away, home_raw: home, away_raw: away,
      commence_time: new Date().toISOString(),
      odds: { home: +oh || null, draw: +od || null, away: +oa || null },
      prediction: p, value_bets: vbets
    }, 'm');
  } catch(e) {
    $('#manual-result').innerHTML = `<div class="error">${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
